<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dune CMD UI</title>
  </head>
  
  <body>
    <header>
      <h1>Dune CMD UI</h1>
    </header>
    <main><h1>Command Form</h1><form action='/dashboard/' method='GET', style='display: flex; flex-direction: column; gap: 10px; align-items: flex-start;'><input type='hidden' name='method' value='filter_data'><fieldset><legend>Basic</legend><div><label for='description'>description</label><span>: </span><input type='text' id='description' name='description' value='' placeholder='workflow description' data-validate='required'></div><div><label for='scope'>scope</label><span>: </span><input type='text' id='scope' name='scope' value='' placeholder='workflow scope' data-validate='required alphanum'></div></fieldset><fieldset><legend>Input source</legend><div><label for='mode'>Mode</label><span>: </span><select name='mode' id='mode'><option value='none' selected>none</option><option value='--mql QUERY'>--mql QUERY</option><option value='--monte-carlo COUNT'>--monte-carlo COUNT</option><option value='none'>none</option></select></div></fieldset><fieldset><legend>Refind (MQL Resubmission)</legend><div><label for='refind-interval-hours'>--refind-interval-hours</label><span>: </span><input type='text' id='refind-interval-hours' name='refind-interval-hours' value='' placeholder='Refind interval (hours)' data-validate='required number min:1 max:100'></div><div><label for='refind-end-date'>--refind-end-date</label><span>: </span><input class='date-selector'type='date' id='refind-end-date' name='refind-end-date' value='2026-04-07' id='datepicker'></div></fieldset><fieldset><legend>Campaign and output</legend><div><label for='campaign-id'>--campaign-id</label><span>: </span><input type='text' id='campaign-id' name='campaign-id' value='' placeholder='campaign-id' data-validate='alphanum'></div><div><label for='workflow-id-file'>--workflow-id-file</label><span>: </span><input type='text' id='workflow-id-file' name='workflow-id-file' value='' placeholder='workflow-id-file' data-validate='alphanum'></div></fieldset><input type='submit' value='Submit' style='background: #E1703D; border-radius: 5px; padding: 5px; color: white; font-weight: bold; font-size: 1em; border: 0; cursor: pointer'></form></main>
  </body>
  <script src='validators.js'></script>
</html>
