<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dune CMD UI</title>
  </head>
  
  <body>
    <header>
      <h1>Dune CMD UI</h1>
    </header>
    <main><h1>Command Form</h1><form action='/dashboard/' method='GET', style='display: flex; flex-direction: column; gap: 10px; align-items: flex-start;'><input type='hidden' name='method' value='filter_data'><fieldset><legend>My FieldSet</legend><div><label for='select1'>Select1</label><span>: </span><select name='select1' id='select1'><option value='ANY'>ANY</option><option disabled>---</option><option value='1'>1</option><option value='2' selected>2</option><option value='3'>3</option></select></div><div><label for='select2'>Select2</label><span>: </span><select name='select2' id='select2'><option value='ANY'>ANY</option><option disabled>---</option><option value='A'>A</option><option value='B' selected>B</option><option value='C'>C</option></select></div><div><label for='date1'>Date1</label><span>: </span><input class='date-selector'type='date' id='date1' name='date1' value='2026-03-27' id='datepicker'></div><div><label for='my_text1'>TEXT_FIELD</label><span>: </span><input type='text' id='my_text1' name='text1' value='' placeholder=' 5 <= x <= 10' data-validate='required number min:5 max:10'></div><div><input type='checkbox' id='my_checkbox1' name='checkbox1' value='asdfasdf' checked onchange='required' ><span> </span><label for='my_checkbox1'>CHECKBOX1</label></div></fieldset><input type='submit' value='Filter' style='background: #E1703D; border-radius: 5px; padding: 5px; color: white; font-weight: bold; font-size: 1em; border: 0; cursor: pointer'></form></main>
  </body>
  <script src='validators.js'></script>
</html>
